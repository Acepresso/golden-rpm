name: release

on:
  push:
    branches:
      - main

env:
  RPM_NAME: golden-rpm
  RPM_VERSION: 1.0
  RPM_RELEASE: 1

jobs:
  build:
    runs-on: ubuntu-latest
    # container: registry.access.redhat.com/ubi9/ubi:latest

    permissions:
      # Needed for signing with GitHub OIDC Token
      id-token: write
      # Needed for creating releases
      contents: write
      # Needed for attestations
      attestations: write

    outputs:
      rpm-file: ${{ steps.build-rpm.outputs.rpm-file }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install RPM build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y rpm make
        
        # dnf install -y rpm rpm-build make
    - name: Build RPM
      id: build-rpm
      run: |
        make build
        RPM_PATH=$(find ./rpmbuild/RPMS/noarch -name "*.rpm" -type f)
        RPM_FILE=$(basename $RPM_PATH)
        cp "$RPM_PATH" .
        echo "rpm-file=$RPM_FILE" >> $GITHUB_OUTPUT

    - name: Install Cosign
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

    - name: Sign RPM with GitHub OIDC Token
      run: |
        cosign sign-blob --yes \
          --bundle="${{ steps.build-rpm.outputs.rpm-file }}.cosign.bundle" \
          "${{ steps.build-rpm.outputs.rpm-file }}"

    - name: Install Syft
      uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

    - name: Generate SBOM
      run: |
        syft "${{ steps.build-rpm.outputs.rpm-file }}" -o spdx-json=sbom-spdx.json

    - name: Attest SBOM
      run: |
        cosign attest-blob --yes \
          --bundle="${{ steps.build-rpm.outputs.rpm-file }}.sbom.bundle" \
          --predicate sbom-spdx.json \
          --type spdxjson \
          "${{ steps.build-rpm.outputs.rpm-file }}"

    - name: Upload RPM as artifact
      uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.5.0
      with:
        name: ${{ steps.build-rpm.outputs.rpm-file }}
        path: |
          ${{ steps.build-rpm.outputs.rpm-file }}
          ${{ steps.build-rpm.outputs.rpm-file }}.cosign.bundle
          ${{ steps.build-rpm.outputs.rpm-file }}.sbom.bundle
          sbom-spdx.json

    - name: Create Release
      uses: softprops/action-gh-release@d99959edae48b5ffffd7b00da66dcdb0a33a52ee # v2.2.0
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          ${{ steps.build-rpm.outputs.rpm-file }}
          ${{ steps.build-rpm.outputs.rpm-file }}.cosign.bundle
          ${{ steps.build-rpm.outputs.rpm-file }}.sbom.bundle
          sbom-spdx.json

  validate:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download RPM artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: ${{ needs.build.outputs.rpm-file }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Verify signature
        run: |
          cosign verify-blob \
            --bundle="${{ needs.build.outputs.rpm-file }}.cosign.bundle" \
            --certificate-identity=https://github.com/${{ github.repository }}/.github/workflows/release.yaml@${{ github.ref }} \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            "${{ needs.build.outputs.rpm-file }}"

      - name: Verify SBOM attestation
        run: |
          cosign verify-blob-attestation \
            --bundle="${{ needs.build.outputs.rpm-file }}.sbom.bundle" \
            --certificate-identity=https://github.com/${{ github.repository }}/.github/workflows/release.yaml@${{ github.ref }} \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            "${{ needs.build.outputs.rpm-file }}"
